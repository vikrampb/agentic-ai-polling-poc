name: Regression Tests

on:
  # ── Configurable schedule ──────────────────────────────────────────────────
  # Uncomment ONE of the following to set the automatic regression schedule:
  #
  # schedule:
  #   - cron: '0 * * * *'    # Every hour
  #   - cron: '0 0 * * *'    # Nightly at midnight UTC
  #   - cron: '0 0 * * 0'    # Weekly on Sunday at midnight UTC

  # ── On-demand triggers ─────────────────────────────────────────────────────
  # Triggered automatically by the polling agent when @regression tests exist
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'What triggered this run (agent/manual/schedule)'
        required: false
        default: 'manual'

permissions:
  contents: write
  actions:  read

jobs:
  regression:
    name: Run @regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Overlay test files from agent/auto-tests branch
        run: |
          git fetch origin agent/auto-tests
          git checkout origin/agent/auto-tests -- tests/ playwright.config.ts || true
          echo "Test files:"
          find tests/ -name "*.spec.ts" 2>/dev/null || echo "No tests found"

      - name: Check for @regression tagged tests
        id: check
        run: |
          if grep -r "@regression" tests/generated/ --include="*.spec.ts" -l 2>/dev/null | grep -q .; then
            COUNT=$(grep -r "@regression" tests/generated/ --include="*.spec.ts" | wc -l | tr -d ' ')
            echo "has_regression=true" >> $GITHUB_OUTPUT
            echo "Found ${COUNT} @regression test(s)"
          else
            echo "has_regression=false" >> $GITHUB_OUTPUT
            echo "No @regression tests found — skipping run"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_regression == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.check.outputs.has_regression == 'true'
        run: npm install

      - name: Install Playwright browsers
        if: steps.check.outputs.has_regression == 'true'
        run: npx playwright install --with-deps chromium

      - name: Seed SQLite database
        if: steps.check.outputs.has_regression == 'true'
        run: npx ts-node --compiler-options '{"module":"commonjs"}' src/db/seed.ts

      - name: Start mock server
        if: steps.check.outputs.has_regression == 'true'
        run: |
          npx ts-node --compiler-options '{"module":"commonjs"}' scripts/mockServer.ts &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:3000/health && break || sleep 2
          done

      - name: Run @regression tests
        if: steps.check.outputs.has_regression == 'true'
        run: npx playwright test --grep @regression
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: Upload regression report artifact
        if: steps.check.outputs.has_regression == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Commit regression results to agent branch
        if: steps.check.outputs.has_regression == 'true' && always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/auto-tests
          git checkout agent/auto-tests

          mkdir -p regression-history

          # Determine next run number
          EXISTING=$(ls regression-history/regression-*.html 2>/dev/null | wc -l | tr -d ' ')
          NEXT=$((EXISTING + 1))
          PADDED=$(printf "%03d" $NEXT)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%S)
          CONCLUSION="${{ job.status }}"
          FILENAME="regression-${PADDED}-${TIMESTAMP}-${CONCLUSION}.html"

          # Copy report if it exists
          if [ -f playwright-report/index.html ]; then
            cp playwright-report/index.html regression-history/${FILENAME}
          else
            echo "<html><body><h1>Regression Run #${NEXT}</h1><p>Result: ${CONCLUSION}</p><p>Run ID: ${{ github.run_id }}</p></body></html>" > regression-history/${FILENAME}
          fi

          # Prune to last 10
          ls -t regression-history/regression-*.html 2>/dev/null | tail -n +11 | xargs rm -f || true

          # Rebuild index
          python3 << 'PYEOF'
          import os, glob

          files = sorted(glob.glob('regression-history/regression-*.html'), reverse=True)
          rows = ""
          for f in files:
              name = os.path.basename(f)
              parts = name.replace('.html','').split('-')
              num = parts[1] if len(parts) > 1 else '?'
              conclusion = parts[-1] if len(parts) > 1 else '?'
              icon = '✅' if conclusion in ('passed', 'success') else '❌'
              rows += f'<tr><td>#{num}</td><td>{name}</td><td>{icon} {conclusion.upper()}</td><td><a href="{name}">View</a></td></tr>\n'

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>Regression History</title>
          <style>body{{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:2rem;max-width:800px;margin:0 auto}}
          h1{{color:#f8fafc}}table{{width:100%;border-collapse:collapse;background:#1e293b;border-radius:8px;overflow:hidden}}
          th{{padding:.75rem;text-align:left;background:#162032;color:#64748b;font-size:.75rem;text-transform:uppercase}}
          td{{padding:.75rem;border-top:1px solid #334155}}a{{color:#4FC3F7}}</style></head>
          <body><h1>Regression Run History</h1>
          <p style="color:#64748b">Runs filtered to @regression tagged tests only</p>
          <table><thead><tr><th>Run</th><th>File</th><th>Result</th><th>Report</th></tr></thead>
          <tbody>{rows}</tbody></table></body></html>"""

          with open('regression-history/index.html', 'w') as idx:
              idx.write(html)

          print(f"Index written with {len(files)} entries")
          PYEOF

          git add regression-history/
          git diff --cached --quiet || git commit -m "ci: regression run #${NEXT} [skip ci]"
          git push origin agent/auto-tests

      - name: Kill mock server
        if: always()
        run: kill $SERVER_PID || true
