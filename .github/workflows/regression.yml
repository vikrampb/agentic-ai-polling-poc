name: Regression Tests

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'What triggered this run'
        required: false
        default: 'manual'
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  actions: read

jobs:
  regression:
    name: Run Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Sync regression tags with Jira
        run: npx ts-node --compiler-options '{"module":"commonjs"}' src/agent/retag.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: AQA
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: ${{ secrets.GH_OWNER }}
          GITHUB_REPO: ${{ secrets.GH_REPO }}
          GITHUB_BRANCH: agent/auto-tests

      - name: Overlay test files from agent branch
        run: |
          git fetch origin agent/auto-tests --force
          git checkout origin/agent/auto-tests -- tests/ playwright.config.ts || true
          echo "AQA-1 @regression count: $(grep -c '@regression' tests/generated/AQA-1.spec.ts 2>/dev/null || echo 0)"
          echo "AQA-2 @regression count: $(grep -c '@regression' tests/generated/AQA-2.spec.ts 2>/dev/null || echo 0)"
          echo "Files with @regression:"
          grep -rl "@regression" tests/generated/ 2>/dev/null || echo "none" 

      - name: Check for regression tests
        id: check
        run: |
          if grep -r "@regression" tests/generated/ --include="*.spec.ts" -l 2>/dev/null | grep -q .; then
            echo "has_regression=true" >> $GITHUB_OUTPUT
            echo "Regression tests found"
          else
            echo "has_regression=false" >> $GITHUB_OUTPUT
            echo "No regression tests found"
          fi

      - name: Install Playwright
        if: steps.check.outputs.has_regression == 'true'
        run: npx playwright install --with-deps chromium

      - name: Seed database
        if: steps.check.outputs.has_regression == 'true'
        run: npx ts-node --compiler-options '{"module":"commonjs"}' src/db/seed.ts

      - name: Start mock server
        if: steps.check.outputs.has_regression == 'true'
        run: |
          npx ts-node --compiler-options '{"module":"commonjs"}' scripts/mockServer.ts &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do curl -sf http://127.0.0.1:3000/health && break || sleep 2; done

      - name: Run regression tests
        if: steps.check.outputs.has_regression == 'true'
        run: npx playwright test --grep @regression --reporter=html,json
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: Upload report artifact
        if: steps.check.outputs.has_regression == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Save results to agent branch
        if: steps.check.outputs.has_regression == 'true' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/auto-tests
          git checkout agent/auto-tests
          mkdir -p regression-history
          NEXT=$(($(ls regression-history/regression-*.html 2>/dev/null | wc -l | tr -d ' ') + 1))
          PADDED=$(printf "%03d" $NEXT)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%S)
          FILENAME="regression-${PADDED}-${TIMESTAMP}-${{ job.status }}.html"
          if [ -f playwright-report/index.html ]; then
            cp playwright-report/index.html regression-history/${FILENAME}
          else
            echo "<html><body><h1>Regression Run #${NEXT}</h1><p>${{ job.status }}</p></body></html>" > regression-history/${FILENAME}
          fi
          ls -t regression-history/regression-*.html 2>/dev/null | tail -n +11 | xargs rm -f || true
          python3 scripts/build_regression_index.py
          git add regression-history/
          git diff --cached --quiet || git commit -m "ci: regression run #${NEXT} [skip ci]"
          git push origin agent/auto-tests

      - name: Kill mock server
        if: always()
        run: kill $SERVER_PID || true
