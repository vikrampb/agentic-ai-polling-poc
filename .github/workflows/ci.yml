name: Playwright Tests — Polling Edition

on:
  # Run nightly at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # On-demand from GitHub UI or agent trigger
  workflow_dispatch:
  # Also triggered when agent pushes new tests
  push:
    branches:
      - "agent/**"

permissions:
  contents: write
  actions:  read
  checks:   read

jobs:
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main (has package.json, src, scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Overlay test files from agent/auto-tests branch
        run: |
          git fetch origin agent/auto-tests
          git checkout origin/agent/auto-tests -- tests/ playwright.config.ts || true
          echo "Test files:"
          find tests/ -type f 2>/dev/null || echo "No tests/ folder"
          echo "package.json: $(ls package.json 2>/dev/null || echo MISSING)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed SQLite database
        run: npx ts-node --compiler-options '{"module":"commonjs"}' src/db/seed.ts

      - name: Start mock login server (background)
        run: |
          npx ts-node --compiler-options '{"module":"commonjs"}' scripts/mockServer.ts &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:3000/health && break || sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Commit results.json back to agent branch
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/auto-tests
          git checkout agent/auto-tests
          mkdir -p playwright-report
          if [ -f playwright-report/results.json ]; then
            git add playwright-report/results.json
            git diff --cached --quiet || git commit -m "ci: update test results [skip ci]"
            git push origin agent/auto-tests
          else
            echo "No results.json — skipping"
          fi

      - name: Kill mock server
        if: always()
        run: kill $SERVER_PID || true
